; cPanel user-level PHP settings
; This file is loaded automatically on most shared cPanel hosts

; Error logging (errors go to error_log file, NOT shown to visitors)
display_errors = Off
log_errors = On
error_reporting = E_ALL
error_log = /tmp/sagor_php_errors.log

; Charset
default_charset = "UTF-8"

; Session
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = "Lax"

; Upload
upload_max_filesize = 64M
post_max_size = 72M
max_execution_time = 120
memory_limit = 256M
